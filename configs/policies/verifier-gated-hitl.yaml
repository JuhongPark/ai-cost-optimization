policy_id: verifier_gated_hitl
policy_class: selective_hitl
description: Escalate when verification fails or repeated retries do not recover quality.
model_strategy:
  primary_model: cheap_model
  secondary_model: strong_model
  routing: optional
retry_policy:
  enabled: true
  max_retries: 2
verification_policy:
  enabled: true
  verifier: task_specific_verifier
human_oversight:
  mode: selective
  escalation_trigger: verifier_failure_or_retry_exhaustion
