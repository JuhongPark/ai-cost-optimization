policy_id: confidence_gated_hitl
policy_class: selective_hitl
description: Escalate to human review when model confidence falls below threshold.
model_strategy:
  primary_model: cheap_model
  routing: optional
retry_policy:
  enabled: true
  max_retries: 1
verification_policy:
  enabled: false
human_oversight:
  mode: selective
  escalation_trigger: confidence_below_threshold
  confidence_threshold: 0.75
